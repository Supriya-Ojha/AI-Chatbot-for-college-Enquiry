<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #5b86e5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #4a75d1;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        /* MOBILE FIX */
        @media (max-width: 600px) {
            .login-box {
                width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="login-box">
        <h2>Admin Login</h2>

        {% with messages = get_flashed_messages() %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/admin_login_validation">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

    </div>

</div>

</body>
</html>
