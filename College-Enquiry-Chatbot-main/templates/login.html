<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

<title>Login</title>

<link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}" type="image">

<link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Catamaran:100,200,300,400,500,600,700,800,900">

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900">

<link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/ionicons.min.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/Login-Form-Dark.css') }}">

<!-- 🔥 MOBILE FIX (ONLY ADD THIS) -->
<style>
    .login-dark form {
        width: 100%;
        max-width: 400px;
        margin: auto;
    }

    @media (max-width: 768px) {
        .login-dark {
            padding: 20px;
        }

        .login-dark form {
            width: 90%;
        }

        .navbar-brand {
            font-size: 16px !important;
        }
    }
</style>

</head>

<body>

<nav class="navbar navbar-dark navbar-expand-lg fixed-top bg-dark navbar-custom">

    <div class="container">

        <a class="navbar-brand" href="#" style="font-size: large;">HS Bot</a>

        <button data-toggle="collapse" class="navbar-toggler" data-target="#navbarResponsive">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">

            <ul class="navbar-nav ml-auto">

                <li class="nav-item"><a class="nav-link" href="/">Log In</a></li>

                <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>

            </ul>

        </div>

    </div>

</nav>

<section class="login-dark"> 

<form action="/login_validation" method="POST">

    <div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger alert-dismissible fade show">

                    <button type="button" class="close" data-dismiss="alert">
                        <span>&times;</span>
                    </button>

                    <strong>{{ message }}</strong><br>
                    <small>Try again or forgot the password!</small>

                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    </div>

    <div class="illustration">
        <i class="icon ion-ios-locked-outline"></i>
    </div>

    <div class="form-group">
        <input class="form-control" type="email" name="email" placeholder="Email" required>
    </div>

    <div class="form-group">
        <input class="form-control" type="password" name="password" placeholder="Password" pattern=".{8,}" required>
    </div>

    <br>

    <div class="form-group">
        <button class="btn btn-block" type="submit" style="background-color: #2980ef; color:white;">
            Log In
        </button>
    </div>

    <a class="forgot" href="/register">Create an Account</a>
    <a class="forgot" href="/forgot">Forgot your email or password?</a>

</form>

</section>

<script src="{{ url_for('static', filename='assets/js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/bootstrap/js/bootstrap.min.js') }}"></script>

</body>
</html>
