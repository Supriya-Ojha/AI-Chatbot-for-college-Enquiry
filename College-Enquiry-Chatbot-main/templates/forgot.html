<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Catamaran">
<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/Login-Form-Dark.css') }}">

<style>
body {
    padding-top: 80px;
    background: linear-gradient(to right, #141e30, #243b55);
}

.login-dark {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

form {
    width: 350px;
    background: #1e2833;
    padding: 30px;
    border-radius: 10px;
    color: white;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
}

h4 {
    text-align: center;
    margin-bottom: 20px;
}

.form-control {
    background: #2c3e50;
    border: none;
    color: white;
}

.form-control:focus {
    background: #34495e;
    color: white;
}

.btn {
    background: #2980ef;
    border: none;
}

.btn:hover {
    background: #1f6fd1;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark navbar-expand-lg fixed-top bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">CRCE Bot</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/">Log In</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="login-dark">

<form action="/forgot_password" method="POST">

    <h4>FORGOT PASSWORD</h4>

    <div class="form-group">
        <input class="form-control" type="email" name="email" placeholder="Enter your Email" required>
    </div>

    <br>

    <div class="form-group">
        <button class="btn btn-primary btn-block" type="submit">
            Recover Password
        </button>
    </div>

    <br>

    <p style="text-align:center;">
        Remembered? <a href="/" style="color:#4da3ff;">Login</a>
    </p>

</form>

</section>

<script src="{{ url_for('static', filename='assets/js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/bootstrap/js/bootstrap.min.js') }}"></script>

</body>
</html>
